services:
  postgres:
    image: postgres:16
    container_name: fitness_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: sporttrack_user
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: sporttrack_db

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sporttrack_user -d sporttrack_db"]
      interval: 5s
      timeout: 5s
      retries: 10

    command: >
      postgres
      -c log_statement=all

volumes:
  pgdata: