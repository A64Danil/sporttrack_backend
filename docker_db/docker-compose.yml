services:
  postgres:
    image: postgres:16
    container_name: fitness_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
      POSTGRES_DB: fitness_db

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d fitness_db"]
      interval: 5s
      timeout: 5s
      retries: 10

    command: >
      postgres
      -c log_statement=all

volumes:
  pgdata: